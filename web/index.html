<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clip Finder</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">YouTube <span class="accent">Clip Finder</span></a>
</nav>

<main class="page">

  <section class="card search-card">
    <form id="search-form" class="search-form">
      <div class="field field-grow">
        <label for="query">Zoekterm(en)</label>
        <input type="text" id="query" name="query" placeholder="bijv. padel highlights" required>
      </div>
      <div class="field field-small">
        <label for="max_results">Aantal resultaten</label>
        <input type="number" id="max_results" name="max_results" min="1" max="100" value="20">
      </div>
      <div class="field field-small">
        <label for="min_duration">Min. lengte (min)</label>
        <input type="number" id="min_duration" name="min_duration" min="0" step="0.5" placeholder="geen">
      </div>
      <div class="field field-grow-min">
        <label>&nbsp;</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="exclude_exported" value="alle" checked>
            Alle resultaten
          </label>
          <label class="radio-label">
            <input type="radio" name="exclude_exported" value="uitsluiten">
            Uitsluiten geëxporteerd
          </label>
        </div>
      </div>
      <div class="field field-btn">
        <button type="submit" class="btn btn-solid" id="search-btn">Zoeken</button>
      </div>
    </form>
    <p id="search-status" class="search-status">
      <span class="spinner" id="search-spinner" hidden></span>
      <span id="search-status-text"></span>
    </p>
  </section>

  <section class="card results-card" id="results-card" hidden>
    <div class="results-toolbar">
      <div class="toolbar-left">
        <label class="checkbox-label">
          <input type="checkbox" id="select-all">
          Selecteer alles
        </label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="filter" value="alle" checked>
            Alle
          </label>
          <label class="radio-label">
            <input type="radio" name="filter" value="niet_geexporteerd">
            Niet geëxporteerd
          </label>
        </div>
      </div>
      <div class="toolbar-right">
        <span id="selection-count" class="selection-count"></span>
        <button type="button" class="btn btn-outline" id="download-zip-btn">Download geselecteerde (ZIP)</button>
        <button type="button" class="btn btn-outline" id="export-btn">Bulk export URL's</button>
      </div>
    </div>
    <p id="download-status" class="search-status">
      <span class="spinner" id="download-spinner" hidden></span>
      <span id="download-status-text"></span>
    </p>

    <div class="filter-bar">
      <div class="field">
        <label for="filter-title">Titel</label>
        <input type="text" id="filter-title" placeholder="zoek in titel">
      </div>
      <div class="field">
        <label for="filter-date-from">Datum van</label>
        <input type="date" id="filter-date-from">
      </div>
      <div class="field">
        <label for="filter-date-to">Datum tot en met</label>
        <input type="date" id="filter-date-to">
      </div>
      <div class="field">
        <label for="filter-uploader">Uploader</label>
        <input type="text" id="filter-uploader" placeholder="zoek op uploader">
      </div>
      <div class="field field-tiny">
        <label for="filter-duration-min">Duur vanaf (min)</label>
        <input type="number" id="filter-duration-min" min="0" step="0.5" placeholder="min">
      </div>
      <div class="field field-tiny">
        <label for="filter-duration-max">Duur tot (min)</label>
        <input type="number" id="filter-duration-max" min="0" step="0.5" placeholder="max">
      </div>
      <div class="field field-tiny">
        <label for="filter-quality">Minimale kwaliteit</label>
        <select id="filter-quality">
          <option value="">Alle</option>
        </select>
      </div>
      <div class="field field-btn">
        <label>&nbsp;</label>
        <button type="button" class="btn btn-outline" id="filter-reset-btn">Filters wissen</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="results-table">
        <thead>
          <tr>
            <th class="col-check"></th>
            <th>Titel</th>
            <th>Datum</th>
            <th>Uploader</th>
            <th>Duur (min)</th>
            <th title="H.264 (AVC), beste beschikbare kwaliteit - vaak maximaal 1080p omdat YouTube hogere resoluties meestal alleen in VP9/AV1 aanbiedt">Kwaliteit</th>
            <th>URL</th>
            <th>Status</th>
            <th>Download</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </section>

</main>

<script src="/static/app.js"></script>
</body>
</html>
